name: keep-warm

# Pings the Render /health endpoint so the free-tier service does not spin down
# (~15 min idle -> ~50s cold start, including the first voice call). GitHub's
# scheduler is best-effort and can run late, so we target every 5 minutes to keep
# a buffer under the 15-minute idle timeout.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 90 https://policyvoice.onrender.com/health; then
              echo
              echo "ok"
              exit 0
            fi
            echo "attempt $i failed, retrying in 15s (service may be cold-starting)..."
            sleep 15
          done
          echo "health check failed after 3 attempts"
          exit 1
